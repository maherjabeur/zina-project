# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.mail_from_email: '%env(MAIL_FROM_EMAIL)%'
    app.mail_from_name: '%env(MAIL_FROM_NAME)%'
    app.mail_admin_email: '%env(MAIL_ADMIN_EMAIL)%'
    app.phpmailer_host: '%env(PHPMAILER_HOST)%'
    app.phpmailer_port: '%env(int:PHPMAILER_PORT)%'
    app.phpmailer_username: '%env(PHPMAILER_USERNAME)%'
    app.phpmailer_password: '%env(PHPMAILER_PASSWORD)%'
    app.phpmailer_encryption: '%env(PHPMAILER_ENCRYPTION)%'
    app.phpmailer_auth: '%env(bool:PHPMAILER_AUTH)%'
    app.phpmailer_dry_run: '%env(bool:PHPMAILER_DRY_RUN)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
    # Service pour l'upload des images produits
    App\Service\ProductImageUploader:
        arguments:
            $targetDirectory: '%kernel.project_dir%/public/uploads/products'
            $slugger: '@Symfony\Component\String\Slugger\SluggerInterface'

    # Service séparé pour l'upload des images slider
    App\Service\SliderImageUploader:
        arguments:
            $targetDirectory: '%kernel.project_dir%/public/uploads/slider'
            $slugger: '@Symfony\Component\String\Slugger\SluggerInterface'

    App\Service\PhpMailerService:
        arguments:
            $host: '%app.phpmailer_host%'
            $port: '%app.phpmailer_port%'
            $username: '%app.phpmailer_username%'
            $password: '%app.phpmailer_password%'
            $encryption: '%app.phpmailer_encryption%'
            $smtpAuth: '%app.phpmailer_auth%'
            $fromEmail: '%app.mail_from_email%'
            $fromName: '%app.mail_from_name%'
            $adminEmail: '%app.mail_admin_email%'
            $dryRun: '%app.phpmailer_dry_run%'
            $projectDir: '%kernel.project_dir%'

    App\Command\ConvertImagesToWebpCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
